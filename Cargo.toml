[package]
name = "ironpress"
version = "0.2.0"
edition = "2021"
rust-version = "1.70"
description = "Pure Rust HTML/CSS-to-PDF converter — no browser, no external dependencies"
license = "MIT"
repository = "https://github.com/gastongouron/ironpress"
keywords = ["pdf", "html", "css", "converter", "document"]
categories = ["text-processing", "encoding"]

[dependencies]
html5ever = "0.27"
markup5ever_rcdom = "0.3"
thiserror = "2"

[dev-dependencies]
