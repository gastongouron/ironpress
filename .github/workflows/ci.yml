name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose
      - run: cargo test --verbose --features remote

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-v1
      - run: command -v wasm-pack || cargo install wasm-pack
      - run: wasm-pack build --target web --features wasm --no-default-features

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-v1
      - run: command -v cargo-fuzz || cargo install cargo-fuzz
      - run: |
          for target in fuzz_html fuzz_css fuzz_markdown fuzz_full_pipeline fuzz_svg fuzz_table_flex; do
            echo "=== Fuzzing $target for 30s ==="
            cargo fuzz run "$target" -- -max_total_time=30
          done

  publish-npm:
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, wasm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-v1
      - run: command -v wasm-pack || cargo install wasm-pack
      - run: wasm-pack build --target web --features wasm --no-default-features
      - run: npm publish --access public || true
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  benchmarks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run parity benchmarks
        run: |
          cargo test --test parity_tests --release -- --ignored --nocapture 2>&1 | tee /tmp/bench-output.txt
      - name: Extract benchmark table
        id: bench
        run: |
          # Extract the markdown table from the test output
          TABLE=$(sed -n '/^| Fixture/,/^$/p' /tmp/bench-output.txt)
          if [ -z "$TABLE" ]; then
            TABLE="⚠️ No benchmark table found in output"
          fi
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "$TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Post benchmark results
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 📊 Parity Benchmark Results\n\n${process.env.TABLE}\n\n*Release build on \`ubuntu-latest\`*`;
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Parity Benchmark Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          TABLE: ${{ steps.bench.outputs.table }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: tarpaulin-${{ runner.os }}-v2
      - run: command -v cargo-tarpaulin || cargo install cargo-tarpaulin
      - run: cargo tarpaulin --out xml --output-dir ./default-cov --skip-clean
      - run: cargo tarpaulin --out xml --output-dir ./remote-cov --skip-clean --features remote
      - uses: codecov/codecov-action@v5
        with:
          files: ./default-cov/cobertura.xml,./remote-cov/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
